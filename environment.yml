name: general_data_analysis
channels:
  - conda-forge
dependencies:
  - python=3.13.5
  - numpy=2.3.0
  - pandas=2.3.0
  - scipy=1.15.2
  - h5py=3.14.0
  - matplotlib-base=3.10.3
  - imageio=2.37.0
  - py-opencv=4.11.0      # provides cv2
  - pillow=11.1.0          # provides PIL
  - pyyaml=6.0.2           # provides yaml
  - pytest=8.4.2
  - setuptools=75.8.2
  - pip=25.1.1
  - pytables=3.10.2
  - pip:
      - -e .
